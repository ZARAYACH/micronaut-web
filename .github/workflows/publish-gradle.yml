name: Publish Gradle Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish. Defaults to the tag name without a leading v.
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Maven packages
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Node dependencies
        run: npm ci

      - name: Resolve publication version
        shell: bash
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            echo "::error::Provide the workflow_dispatch version input when publishing outside a v* tag."
            exit 1
          fi
          echo "MICRONAUT_WEB_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version $VERSION"

      - name: Test template renderer
        run: ./gradlew :micronaut-web-template:test

      - name: Verify static resource jars
        run: ./gradlew -q :micronaut-web-docs:verifyStaticSurfaceJar :micronaut-web-guides:verifyStaticSurfaceJar

      - name: Verify Maven publications locally
        run: ./gradlew -q publishToMavenLocal

      - name: Publish Maven packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew -q publish
